<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеоҳои Садриддин Айни</title>
    <body>
    <style>
        body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a84b8, #1bbbe3, #0f2027);
    background-size: 300% 300%;
    animation: gradientMove 10s ease infinite;
}
        header {
    position: sticky;
    top: 0;
    background: rgba(39, 18, 18, 0.571);
    backdrop-filter: blur(15px);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
}
        nav a {
    position: relative;
    color: rgb(244, 243, 243);
    text-decoration: none;
}
nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0;
    height: 2px;
    background: #17ccf0;
    transition: 0.3s;
}
nav a:hover {
    color: #1bbbe3;
}
nav a:hover::after {
    width: 100%;
}
h1 {
    color: white;
}
.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
        }
        .video-card {
    background: rgba(74, 12, 167, 0.1);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 10px;
    border: 1px solid rgba(39, 7, 99, 0.2);
}
        iframe {
            width: 100%;
            height: 200px;
            border-radius: 10px;
        }
        h3 {
            font-size: 16px;
        }
        @keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}
    </style>
</head>

<header>
    <h1>Видеоҳои Садриддин Айни</h1>
    <nav>
        <a href="index.html">Асосӣ</a>
    </nav>
</header>

<div class="container">

    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/8wD3A0k_rVU?si=k_30j5VuwIXQIlIT" allowfullscreen></iframe>
        <h3>Филми "Марги Судхур" аз асари Садриддин Айнӣ  </h3>
    </div>

    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/ljcIE-AFylk?si=JZNHUtXMeN_KrIF-" allowfullscreen></iframe>
        <h3>Видео дар бораи фаъолияти Садриддин Айнӣ</h3>
    </div>

    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/Eu2-XC0Qs-I?si=ujmwUNmABIad2WSu" allowfullscreen></iframe>
        <h3>Филм аз асари "Мактаби куҳна"-и Садриддин Айнӣ</h3>
    </div>
</div>
</body>
</html>
